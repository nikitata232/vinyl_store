<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinyl Store</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0ece4;
    --muted: #666;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 2.2rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .api-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }
  .dot.ok { background: var(--accent); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 14px 28px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  main { padding: 40px; max-width: 1200px; margin: 0 auto; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 3rem;
    letter-spacing: 1px;
    line-height: 1;
  }
  .section-url {
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* BUTTON */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .btn:active { transform: scale(0.97); }
  .btn.danger { border-color: var(--accent2); color: var(--accent2); }
  .btn.danger:hover { background: var(--accent2); color: #fff; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* INPUT / SELECT */
  input, select, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 10px 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface); }

  /* VINYL GRID */
  .vinyl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-top: 24px;
  }
  .vinyl-card {
    background: var(--surface);
    padding: 24px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .vinyl-card:hover { background: var(--surface2); }
  .vinyl-card.selected { background: #1a1e0d; }
  .vinyl-card.selected::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
  }

  .vinyl-disc {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: conic-gradient(#222 0deg, #333 30deg, #222 60deg, #333 90deg, #222 120deg, #333 150deg, #222 180deg, #333 210deg, #222 240deg, #333 270deg, #222 300deg, #333 330deg, #222 360deg);
    margin-bottom: 16px;
    position: relative;
    flex-shrink: 0;
    animation: none;
    transition: animation 0.3s;
  }
  .vinyl-card:hover .vinyl-disc { animation: spin 3s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .vinyl-disc::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
  }

  .vinyl-title { font-size: 0.95rem; font-weight: 400; margin-bottom: 4px; }
  .vinyl-artist { font-size: 0.75rem; color: var(--muted); margin-bottom: 12px; }
  .vinyl-meta { display: flex; justify-content: space-between; align-items: center; }
  .vinyl-price { font-size: 1.1rem; color: var(--accent); }
  .vinyl-stock { font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; }
  .vinyl-genre {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ORDER FORM */
  .order-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
  @media(max-width:700px){ .order-grid{grid-template-columns:1fr;} }

  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

  .order-items { margin-top: 24px; }
  .order-item-row {
    display: grid;
    grid-template-columns: 1fr 100px auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 12px;
  }
  .add-item-btn {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 2px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .add-item-btn:hover { border-color: var(--accent); color: var(--accent); }

  .remove-btn {
    padding: 10px 14px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .remove-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* LOG / RESPONSE */
  .log-panel {
    margin-top: 32px;
    border: 1px solid var(--border);
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .log-body {
    padding: 16px;
    font-size: 0.78rem;
    line-height: 1.7;
    max-height: 300px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .log-body.success { color: var(--accent); }
  .log-body.error { color: var(--accent2); }
  .log-body.loading { color: var(--muted); font-style: italic; }

  /* SINGLE LOOKUP */
  .lookup-row { display: flex; gap: 12px; align-items: flex-end; }
  .lookup-row .field-group { flex: 1; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 32px; right: 32px;
    padding: 14px 24px;
    font-size: 0.75rem;
    letter-spacing: 1px;
    background: var(--accent);
    color: var(--bg);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: var(--accent2); color: #fff; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }
  .empty .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  /* DETAIL PANEL */
  .detail-panel {
    margin-top: 24px;
    border: 1px solid var(--accent);
    padding: 28px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .detail-panel.visible { display: block; }
  .detail-row { display: flex; gap: 40px; flex-wrap: wrap; }
  .detail-field { flex: 1; min-width: 120px; }
  .detail-key { font-size: 0.6rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .detail-val { font-size: 1.1rem; }
</style>
</head>
<body>

<header>
  <div class="logo">VINYL<span>STORE</span></div>
  <div class="api-badge">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">ПРОВЕРКА API...</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="switchTab('vinyls')">🎵 Пластинки</button>
  <button class="tab" onclick="switchTab('lookup')">🔍 Поиск по ID</button>
  <button class="tab" onclick="switchTab('orders')">🛒 Заказ</button>
</nav>

<main>

  <!-- TAB: VINYLS -->
  <div class="section active" id="tab-vinyls">
    <div class="section-header">
      <div class="section-title">ВСЕ ПЛАСТИНКИ</div>
      <div class="section-url">GET /vinyls</div>
      <button class="btn" onclick="loadVinyls()" id="loadBtn">
        <span class="spinner" id="loadSpinner" style="display:none"></span>
        ЗАГРУЗИТЬ
      </button>
    </div>

    <div id="vinylGrid" class="vinyl-grid" style="display:none"></div>
    <div class="empty" id="vinylEmpty">
      <div class="empty-icon">💿</div>
      Нажми ЗАГРУЗИТЬ чтобы получить данные с API
    </div>

    <div class="log-panel" id="vinylLog" style="display:none">
      <div class="log-header">
        <span>RAW API RESPONSE</span>
        <span id="vinylLogMeta"></span>
      </div>
      <div class="log-body" id="vinylLogBody"></div>
    </div>
  </div>

  <!-- TAB: LOOKUP -->
  <div class="section" id="tab-lookup">
    <div class="section-header">
      <div class="section-title">ПОИСК</div>
      <div class="section-url">GET /vinyls/{id}</div>
    </div>

    <div class="lookup-row">
      <div class="field-group">
        <label class="field-label">ID пластинки</label>
        <input type="number" id="lookupId" placeholder="например: 1" min="1" onkeydown="if(event.key==='Enter')lookupVinyl()">
      </div>
      <button class="btn" onclick="lookupVinyl()">НАЙТИ</button>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-row">
        <div class="detail-field"><div class="detail-key">ID</div><div class="detail-val" id="d-id">—</div></div>
        <div class="detail-field"><div class="detail-key">НАЗВАНИЕ</div><div class="detail-val" id="d-title">—</div></div>
        <div class="detail-field"><div class="detail-key">АРТИСТ</div><div class="detail-val" id="d-artist">—</div></div>
        <div class="detail-field"><div class="detail-key">ЖАНР</div><div class="detail-val" id="d-genre">—</div></div>
        <div class="detail-field"><div class="detail-key">ЦЕНА</div><div class="detail-val" id="d-price" style="color:var(--accent)">—</div></div>
        <div class="detail-field"><div class="detail-key">СКЛАД</div><div class="detail-val" id="d-stock">—</div></div>
      </div>
    </div>

    <div class="log-panel" style="margin-top:24px" id="lookupLog" style="display:none">
      <div class="log-header"><span>RAW API RESPONSE</span></div>
      <div class="log-body" id="lookupLogBody"></div>
    </div>
  </div>

  <!-- TAB: ORDERS -->
  <div class="section" id="tab-orders">
    <div class="section-header">
      <div class="section-title">НОВЫЙ ЗАКАЗ</div>
      <div class="section-url">POST /orders</div>
    </div>

    <div class="order-items">
      <div class="field-label" style="margin-bottom:12px">ПОЗИЦИИ ЗАКАЗА</div>
      <div id="orderItemsContainer"></div>
      <button class="add-item-btn" onclick="addOrderItem()">+ ДОБАВИТЬ ПОЗИЦИЮ</button>
    </div>

    <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn" onclick="submitOrder()">ОТПРАВИТЬ ЗАКАЗ</button>
      <button class="btn danger" onclick="clearOrder()">ОЧИСТИТЬ</button>
    </div>

    <div class="log-panel" style="margin-top:24px" id="orderLog" style="display:none">
      <div class="log-header">
        <span>RAW API RESPONSE</span>
        <span id="orderLogMeta"></span>
      </div>
      <div class="log-body" id="orderLogBody"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
const API = 'http://localhost:8000';

// ── STATUS CHECK ──────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch(`${API}/vinyls`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) {
      document.getElementById('statusDot').className = 'dot ok';
      document.getElementById('statusText').textContent = 'API ONLINE';
    } else { throw new Error(); }
  } catch {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'API OFFLINE';
  }
}
checkStatus();
setInterval(checkStatus, 10000);

// ── TABS ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 2500);
}

// ── VINYLS ────────────────────────────────────────────────
async function loadVinyls() {
  const btn = document.getElementById('loadBtn');
  const spinner = document.getElementById('loadSpinner');
  const grid = document.getElementById('vinylGrid');
  const empty = document.getElementById('vinylEmpty');
  const log = document.getElementById('vinylLog');
  const logBody = document.getElementById('vinylLogBody');
  const logMeta = document.getElementById('vinylLogMeta');

  btn.disabled = true;
  spinner.style.display = 'inline-block';

  const t0 = Date.now();
  try {
    const r = await fetch(`${API}/vinyls`);
    const ms = Date.now() - t0;
    const data = await r.json();

    // Show log
    log.style.display = 'block';
    logBody.className = 'log-body ' + (r.ok ? 'success' : 'error');
    logBody.textContent = JSON.stringify(data, null, 2);
    logMeta.textContent = `${r.status} · ${ms}ms · ${JSON.stringify(data).length} bytes`;

    if (!r.ok) { showToast('Ошибка: ' + r.status, true); return; }

    if (!data.length) {
      empty.style.display = 'block';
      empty.innerHTML = '<div class="empty-icon">📭</div>Пластинок нет в базе';
      grid.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    grid.style.display = 'grid';
    grid.innerHTML = data.map(v => `
      <div class="vinyl-card" onclick="selectVinyl(${v.id})">
        <div class="vinyl-genre">${v.genre || 'N/A'}</div>
        <div class="vinyl-disc"></div>
        <div class="vinyl-title">${v.title}</div>
        <div class="vinyl-artist">${v.artist}</div>
        <div class="vinyl-meta">
          <div class="vinyl-price">$${v.price}</div>
          <div class="vinyl-stock">${v.stock} шт</div>
        </div>
      </div>
    `).join('');

    showToast(`Загружено ${data.length} пластинок`);
  } catch(e) {
    log.style.display = 'block';
    logBody.className = 'log-body error';
    logBody.textContent = 'Ошибка соединения:\n' + e.message;
    showToast('Не удалось подключиться к API', true);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

function selectVinyl(id) {
  document.querySelectorAll('.vinyl-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // switch to lookup tab
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-lookup').classList.add('active');
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.getElementById('lookupId').value = id;
  lookupVinyl();
}

// ── LOOKUP ────────────────────────────────────────────────
async function lookupVinyl() {
  const id = document.getElementById('lookupId').value;
  if (!id) { showToast('Введи ID', true); return; }

  const panel = document.getElementById('detailPanel');
  const log = document.getElementById('lookupLog');
  const logBody = document.getElementById('lookupLogBody');
  log.style.display = 'block';
  logBody.className = 'log-body loading';
  logBody.textContent = `GET /vinyls/${id} ...`;
  panel.classList.remove('visible');

  try {
    const r = await fetch(`${API}/vinyls/${id}`);
    const data = await r.json();

    logBody.className = 'log-body ' + (r.ok ? 'success' : 'error');
    logBody.textContent = JSON.stringify(data, null, 2);

    if (!r.ok) { showToast(data.detail || 'Не найдено', true); return; }

    document.getElementById('d-id').textContent = data.id;
    document.getElementById('d-title').textContent = data.title;
    document.getElementById('d-artist').textContent = data.artist;
    document.getElementById('d-genre').textContent = data.genre || '—';
    document.getElementById('d-price').textContent = '$' + data.price;
    document.getElementById('d-stock').textContent = data.stock + ' шт';
    panel.classList.add('visible');
    showToast('Найдено: ' + data.title);
  } catch(e) {
    logBody.className = 'log-body error';
    logBody.textContent = 'Ошибка: ' + e.message;
    showToast('Ошибка соединения', true);
  }
}

// ── ORDERS ────────────────────────────────────────────────
let orderItems = [];

function renderOrderItems() {
  const c = document.getElementById('orderItemsContainer');
  if (!orderItems.length) {
    c.innerHTML = '';
    return;
  }
  c.innerHTML = orderItems.map((item, i) => `
    <div class="order-item-row">
      <div class="field-group">
        <label class="field-label">ID пластинки</label>
        <input type="number" value="${item.vinyl_id}" min="1" placeholder="ID"
          onchange="orderItems[${i}].vinyl_id=+this.value">
      </div>
      <div class="field-group">
        <label class="field-label">Кол-во</label>
        <input type="number" value="${item.quantity}" min="1" placeholder="1"
          onchange="orderItems[${i}].quantity=+this.value">
      </div>
      <button class="remove-btn" onclick="removeItem(${i})">✕</button>
    </div>
  `).join('');
}

function addOrderItem() {
  orderItems.push({ vinyl_id: '', quantity: 1 });
  renderOrderItems();
}

function removeItem(i) {
  orderItems.splice(i, 1);
  renderOrderItems();
}

function clearOrder() {
  orderItems = [];
  renderOrderItems();
  document.getElementById('orderLog').style.display = 'none';
}

async function submitOrder() {
  if (!orderItems.length) { showToast('Добавь хотя бы одну позицию', true); return; }

  const payload = { items: orderItems.map(i => ({ vinyl_id: i.vinyl_id, quantity: i.quantity })) };

  const log = document.getElementById('orderLog');
  const logBody = document.getElementById('orderLogBody');
  const logMeta = document.getElementById('orderLogMeta');
  log.style.display = 'block';
  logBody.className = 'log-body loading';
  logBody.textContent = 'POST /orders\n\nОтправляем:\n' + JSON.stringify(payload, null, 2);

  const t0 = Date.now();
  try {
    const r = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const ms = Date.now() - t0;
    const data = await r.json();

    logBody.className = 'log-body ' + (r.ok ? 'success' : 'error');
    logBody.textContent = JSON.stringify(data, null, 2);
    logMeta.textContent = `${r.status} · ${ms}ms`;

    if (r.ok) {
      showToast('Заказ создан! Итого: $' + data.total_price);
      orderItems = [];
      renderOrderItems();
    } else {
      showToast(data.detail || 'Ошибка заказа', true);
    }
  } catch(e) {
    logBody.className = 'log-body error';
    logBody.textContent = 'Ошибка: ' + e.message;
    showToast('Ошибка соединения', true);
  }
}

// init order
addOrderItem();
</script>
